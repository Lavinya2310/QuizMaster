{% extends "base.html" %}

{% block title %}{% if subject %}Edit{% else %}New{% endif %} Subject{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h2 class="mb-4">
      {% if subject %}Edit Subject{% else %}Create New Subject{% endif %}
    </h2>
    
    <form method="POST">
      <div class="mb-4">
        <label for="name" class="form-label fw-bold">Subject Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control form-control-lg" id="name" name="name" 
               value="{{ subject.name if subject else '' }}" required autofocus>
      </div>
      <div class="mb-4">
        <label for="description" class="form-label fw-bold">Description</label>
        <textarea class="form-control" id="description" name="description" rows="4">
          {{ subject.description if subject else '' }}
        </textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Save</button>
      <a href="{{ url_for('admin.subjects') }}" class="btn btn-secondary btn-lg ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
